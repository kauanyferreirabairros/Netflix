<!DOCTYPE html>
<html lang="pt-BR" >
<head>
  <meta charset="UTF-8">
  <title>Página de login da Netflix
</title>
  <link rel="stylesheet" href="./style.css">

</head>
<body>
<nav>
  <a href="#"><img src="http://codingstella.com/wp-content/uploads/2024/01/580b57fcd9996e24bc43c529.png" alt="logo"></a>
</nav>
<div class="form-wrapper">
  <h2>Entrar</h2>
  <form action="#">
    <div class="form-control">
      <input type="text" required>
      <label>Email ou telefone</label>
    </div>
    <div class="form-control">
      <input type="password" required>
      <label>Senha</label>
    </div>
    <button type="submit"><a href="profiles.html">Entrar</a></button>
    <div class="form-help">
      <div class="remember-me">
        <input type="checkbox" id="remember-me">
        <label for="remember-me">Lembre de mim</label>
      </div>
      <a href="#">Precisa de ajuda?</a>
    </div>
  </form>
  <p>Novo na Netflix <a href="#">Inscreva-se agora
</a></p>
  <small>
   Esta página está protegida pelo Google reCAPTCHA para garantir que você não é um robô.

    <a href="#">Leia mais.</a>
  </small>
</div>
  
</body>
</html>
